<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas - Perú</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="container">
        <h1>Sistema de Ventas</h1>
        
        <div class="form-group">
            <label>Cliente:</label>
            <input type="text" id="cliente" placeholder="Ingrese nombre del cliente">
        </div>

        <div class="form-group">
            <label>Producto:</label>
            <input type="text" id="producto" placeholder="Ingrese producto">
        </div>

        <div class="form-group">
            <label>Cantidad:</label>
            <input type="number" id="cantidad" min="1" placeholder="Ingrese cantidad">
        </div>

        <div class="form-group">
            <label>Precio Unitario (S/):</label>
            <input type="number" id="precio" min="0.01" step="0.01" placeholder="Ingrese precio">
        </div>

        <div class="form-group">
            <label>Total:</label>
            <input type="text" id="total" readonly placeholder="S/ 0.00">
        </div>

        <button type="button" onclick="calcular()" class="btn-calc">Calcular Total</button>
        <button type="button" onclick="registrar()" class="btn-reg">Registrar Venta</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
